# =============================================================================
# KULT Platform — Render Blueprint
# https://render.com/docs/blueprint-spec
#
# Deploy: push to GitHub → Render Dashboard → New → Blueprint → select repo
#
# COST ESTIMATE (Starter plan, always-on):
#   11 web services × $7/mo  =  $77/mo
#   1  PostgreSQL (Starter)  =  $7/mo
#   1  Redis (Starter)       =  $10/mo
#   TOTAL                    ≈  $94/mo
# =============================================================================

# ─── Env Var Groups (shared across services) ──────────────────────────────────
# Referenced inside services with:  - fromGroup: group-name
envVarGroups:
  - name: kult-shared-auth
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: INTERNAL_API_SECRET
        generateValue: true

  - name: kult-blockchain
    envVars:
      - key: BLOCKCHAIN_RPC_URL
        value: https://evmrpc.0g.ai
      - key: CHAIN_ID
        value: "16600"
      - key: AGENT_REGISTRY_CONTRACT
        value: "0x0000000000000000000000000000000000000000"
      - key: GAME_ECONOMY_CONTRACT
        value: "0x0000000000000000000000000000000000000000"
      - key: TREASURY_CONTRACT
        value: "0x0000000000000000000000000000000000000000"
      - key: SETTLEMENT_CONTRACT
        value: "0x0000000000000000000000000000000000000000"

# ─── Databases ────────────────────────────────────────────────────────────────
databases:
  - name: kult-postgres
    databaseName: kult_platform
    user: kult_user
    plan: starter
    postgresMajorVersion: "16"
    region: oregon

# ─── Services ─────────────────────────────────────────────────────────────────
services:

  # ── Redis ───────────────────────────────────────────────────────────────────
  - type: redis
    name: kult-redis
    plan: starter
    region: oregon
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

  # ── Gateway ─────────────────────────────────────────────────────────────────
  - type: web
    name: kult-gateway
    runtime: docker
    dockerfilePath: services/gateway-service/Dockerfile
    dockerContext: .
    plan: starter
    region: oregon
    healthCheckPath: /health
    envVars:
      - fromGroup: kult-shared-auth
      - key: NODE_ENV
        value: production
      - key: LOG_LEVEL
        value: info
      - key: REDIS_URL
        fromService:
          type: redis
          name: kult-redis
          property: connectionString
      - key: AGENT_REGISTRY_SERVICE_URL
        sync: false
      - key: MODEL_REGISTRY_SERVICE_URL
        sync: false
      - key: AVATAR_AI_SERVICE_URL
        sync: false
      - key: ARENA_SERVICE_URL
        sync: false
      - key: RANKING_SERVICE_URL
        sync: false
      - key: TOURNAMENT_SERVICE_URL
        sync: false
      - key: TELEMETRY_SERVICE_URL
        sync: false
      - key: WALLET_SERVICE_URL
        sync: false
      - key: AI_TRANSACTION_SERVICE_URL
        sync: false
      - key: SETTLEMENT_SERVICE_URL
        sync: false

  # ── Agent Registry ───────────────────────────────────────────────────────────
  - type: web
    name: kult-agent-registry
    runtime: docker
    dockerfilePath: services/agent-registry-service/Dockerfile
    dockerContext: .
    plan: starter
    region: oregon
    healthCheckPath: /health
    envVars:
      - fromGroup: kult-shared-auth
      - fromGroup: kult-blockchain
      - key: NODE_ENV
        value: production
      - key: LOG_LEVEL
        value: info
      - key: DATABASE_URL
        fromDatabase:
          name: kult-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: kult-redis
          property: connectionString
      - key: WALLET_SERVICE_URL
        sync: false

  # ── Model Registry ───────────────────────────────────────────────────────────
  - type: web
    name: kult-model-registry
    runtime: docker
    dockerfilePath: services/model-registry-service/Dockerfile
    dockerContext: .
    plan: starter
    region: oregon
    healthCheckPath: /health
    envVars:
      - fromGroup: kult-shared-auth
      - key: NODE_ENV
        value: production
      - key: LOG_LEVEL
        value: info
      - key: DATABASE_URL
        fromDatabase:
          name: kult-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: kult-redis
          property: connectionString
      - key: ZERO_G_STORAGE_URL
        value: https://indexer-storage-testnet-standard.0g.ai
      - key: ZERO_G_GATEWAY_URL
        value: https://rpc-storage-testnet.0g.ai
      - key: AGENT_REGISTRY_SERVICE_URL
        sync: false

  # ── Avatar AI ────────────────────────────────────────────────────────────────
  - type: web
    name: kult-avatar-ai
    runtime: docker
    dockerfilePath: services/avatar-ai-service/Dockerfile
    dockerContext: .
    plan: standard
    region: oregon
    healthCheckPath: /health
    envVars:
      - fromGroup: kult-shared-auth
      - key: NODE_ENV
        value: production
      - key: LOG_LEVEL
        value: info
      - key: REDIS_URL
        fromService:
          type: redis
          name: kult-redis
          property: connectionString
      - key: TRAINING_QUEUE_NAME
        value: avatar-training
      - key: TRAINING_CONCURRENCY
        value: "2"
      - key: TRAINING_POLL_INTERVAL_MS
        value: "5000"
      - key: TRAINING_MAX_POLL_ATTEMPTS
        value: "120"
      - key: BEHAVIOR_BUFFER_FLUSH_SIZE
        value: "50"
      - key: BEHAVIOR_BUFFER_TTL_SECONDS
        value: "300"
      - key: AI_WARZONE_SERVICE_URL
        value: https://ai-warzone.onrender.com
      - key: MODEL_REGISTRY_SERVICE_URL
        sync: false

  # ── Arena ────────────────────────────────────────────────────────────────────
  - type: web
    name: kult-arena
    runtime: docker
    dockerfilePath: services/arena-service/Dockerfile
    dockerContext: .
    plan: starter
    region: oregon
    healthCheckPath: /health
    envVars:
      - fromGroup: kult-shared-auth
      - key: NODE_ENV
        value: production
      - key: LOG_LEVEL
        value: info
      - key: DATABASE_URL
        fromDatabase:
          name: kult-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: kult-redis
          property: connectionString
      - key: MATCHMAKING_INTERVAL_MS
        value: "5000"
      - key: MATCHMAKING_ELO_RANGE_INITIAL
        value: "200"
      - key: MATCHMAKING_ELO_RANGE_EXPAND_PER_30S
        value: "50"
      - key: MATCHMAKING_QUEUE_TTL_SECONDS
        value: "300"
      - key: MATCH_TIMEOUT_MINUTES
        value: "30"
      - key: AGENT_REGISTRY_SERVICE_URL
        sync: false
      - key: AVATAR_AI_SERVICE_URL
        sync: false
      - key: RANKING_SERVICE_URL
        sync: false
      - key: SETTLEMENT_SERVICE_URL
        sync: false

  # ── Ranking ───────────────────────────────────────────────────────────────────
  - type: web
    name: kult-ranking
    runtime: docker
    dockerfilePath: services/ranking-service/Dockerfile
    dockerContext: .
    plan: starter
    region: oregon
    healthCheckPath: /health
    envVars:
      - fromGroup: kult-shared-auth
      - key: NODE_ENV
        value: production
      - key: LOG_LEVEL
        value: info
      - key: DATABASE_URL
        fromDatabase:
          name: kult-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: kult-redis
          property: connectionString
      - key: ELO_K_FACTOR_DEFAULT
        value: "32"
      - key: ELO_K_FACTOR_ESTABLISHED
        value: "16"
      - key: ELO_K_FACTOR_MASTER
        value: "12"
      - key: ELO_FLOOR
        value: "100"
      - key: ELO_PROVISIONAL_GAMES
        value: "30"
      - key: LEADERBOARD_CACHE_TTL_SECONDS
        value: "30"
      - key: AGENT_REGISTRY_SERVICE_URL
        sync: false

  # ── Tournament ────────────────────────────────────────────────────────────────
  - type: web
    name: kult-tournament
    runtime: docker
    dockerfilePath: services/tournament-service/Dockerfile
    dockerContext: .
    plan: starter
    region: oregon
    healthCheckPath: /health
    envVars:
      - fromGroup: kult-shared-auth
      - key: NODE_ENV
        value: production
      - key: LOG_LEVEL
        value: info
      - key: DATABASE_URL
        fromDatabase:
          name: kult-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: kult-redis
          property: connectionString
      - key: MAX_TOURNAMENT_PARTICIPANTS
        value: "128"
      - key: MIN_TOURNAMENT_PARTICIPANTS
        value: "4"
      - key: PRIZE_PAYOUT_1ST_PCT
        value: "50"
      - key: PRIZE_PAYOUT_2ND_PCT
        value: "25"
      - key: PRIZE_PAYOUT_3RD_PCT
        value: "15"
      - key: PRIZE_PAYOUT_4TH_PCT
        value: "10"
      - key: ARENA_SERVICE_URL
        sync: false
      - key: SETTLEMENT_SERVICE_URL
        sync: false
      - key: WALLET_SERVICE_URL
        sync: false

  # ── Telemetry ─────────────────────────────────────────────────────────────────
  - type: web
    name: kult-telemetry
    runtime: docker
    dockerfilePath: services/telemetry-service/Dockerfile
    dockerContext: .
    plan: starter
    region: oregon
    healthCheckPath: /health
    envVars:
      - fromGroup: kult-shared-auth
      - key: NODE_ENV
        value: production
      - key: LOG_LEVEL
        value: info
      - key: REDIS_URL
        fromService:
          type: redis
          name: kult-redis
          property: connectionString
      - key: MAX_EVENTS_PER_BATCH
        value: "100"
      - key: EVENT_TTL_DAYS
        value: "90"
      - key: MONGODB_URI
        sync: false

  # ── Wallet ────────────────────────────────────────────────────────────────────
  - type: web
    name: kult-wallet
    runtime: docker
    dockerfilePath: services/wallet-service/Dockerfile
    dockerContext: .
    plan: starter
    region: oregon
    healthCheckPath: /health
    envVars:
      - fromGroup: kult-shared-auth
      - fromGroup: kult-blockchain
      - key: NODE_ENV
        value: production
      - key: LOG_LEVEL
        value: info
      - key: DATABASE_URL
        fromDatabase:
          name: kult-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: kult-redis
          property: connectionString
      - key: ENCRYPTION_KEY
        generateValue: true

  # ── AI Transaction ────────────────────────────────────────────────────────────
  - type: web
    name: kult-ai-transaction
    runtime: docker
    dockerfilePath: services/ai-transaction-service/Dockerfile
    dockerContext: .
    plan: starter
    region: oregon
    healthCheckPath: /health
    envVars:
      - fromGroup: kult-shared-auth
      - fromGroup: kult-blockchain
      - key: NODE_ENV
        value: production
      - key: LOG_LEVEL
        value: info
      - key: DATABASE_URL
        fromDatabase:
          name: kult-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: kult-redis
          property: connectionString
      - key: TX_QUEUE_NAME
        value: ai-transactions
      - key: TX_QUEUE_CONCURRENCY
        value: "5"
      - key: TX_CONFIRMATION_BLOCKS
        value: "2"
      - key: TX_POLL_INTERVAL_MS
        value: "3000"
      - key: TX_MAX_POLL_ATTEMPTS
        value: "60"
      - key: DEFAULT_DAILY_LIMIT_ETH
        value: "0.1"
      - key: DEFAULT_PER_TX_LIMIT_ETH
        value: "0.01"
      - key: GAS_BUFFER_ETH
        value: "0.002"
      - key: WALLET_SERVICE_URL
        sync: false

  # ── Settlement ────────────────────────────────────────────────────────────────
  - type: web
    name: kult-settlement
    runtime: docker
    dockerfilePath: services/settlement-service/Dockerfile
    dockerContext: .
    plan: starter
    region: oregon
    healthCheckPath: /health
    envVars:
      - fromGroup: kult-shared-auth
      - fromGroup: kult-blockchain
      - key: NODE_ENV
        value: production
      - key: LOG_LEVEL
        value: info
      - key: DATABASE_URL
        fromDatabase:
          name: kult-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: kult-redis
          property: connectionString
      - key: SETTLER_PRIVATE_KEY
        sync: false
      - key: ARENA_SERVICE_URL
        sync: false
      - key: TOURNAMENT_SERVICE_URL
        sync: false
